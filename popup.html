<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 12px;
      min-width: 260px;
      max-width: 320px;
    }
    button {
      width: 100%;
      padding: 8px 12px;
      cursor: pointer;
      box-sizing: border-box;
    }
    button.secondary {
      margin-top: 8px;
    }
    #export {
      margin-top: 12px;
    }
    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #333;
    }
    #status.error {
      color: #a40000;
    }
    fieldset {
      margin: 12px 0 0;
      padding: 8px 10px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    legend {
      font-size: 13px;
      padding: 0 4px;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
      font-size: 13px;
    }
    .row input[type="checkbox"] {
      flex-shrink: 0;
    }
    .swatch {
      width: 14px;
      height: 14px;
      border: 1px solid #888;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .hint {
      font-size: 11px;
      color: #555;
      margin: 6px 0 0;
      line-height: 1.35;
    }
    #highlights-empty {
      font-size: 12px;
      color: #666;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div class="row" style="margin-top: 0">
    <input type="checkbox" id="cb-remove-strike" />
    <label for="cb-remove-strike">Remover conteúdo tachado</label>
  </div>

  <fieldset>
    <legend>Realces (cores de fundo)</legend>
    <button type="button" id="scan" class="secondary">Atualizar análise</button>
    <div id="highlights-panel" hidden>
      <div class="row" style="margin-top: 8px">
        <input type="checkbox" id="cb-include-hl-tags" />
        <label for="cb-include-hl-tags"
          >Incluir tags de cor no Markdown (comentários <code>alm-hl</code> no
          texto)</label
        >
      </div>
      <p class="hint" id="hl-tags-hint" hidden>
        Com esta opção ativa, marque abaixo quais cores quer etiquetar.
      </p>
      <div id="color-checkboxes"></div>
    </div>
    <p id="highlights-empty">A abrir, analisamos cores de realce…</p>
  </fieldset>

  <button type="button" id="export">Baixar Markdown do item</button>

  <p id="status" aria-live="polite"></p>
  <script src="popup.js"></script>
</body>
</html>
